network:
  channel: CAN1
  nominal_bitrate: null
  data_bitrate: null
  brs: null

optimization:
  slot_ms: 5
  hyperperiod_ms: auto
  hyperperiod_cap_ms: 5000
  offset_min_ms: 15
  offset_max_ms: 100
  offset_step_ms: 5
  restart_policy:
    mode: adaptive
    min_attempts: 20
    check_interval: 10
    patience_attempts: 20
    max_attempts: 80
  hot_slot_count: 3
  conflict_candidate_cap: 6
  pair_neighbor_steps: [1, 2, 3]
  variance_offset_cap: 3

model:
  weight_mode: frame_time_us
  average_load_limit: 0.75

objective:
  mode: balanced
  peak_tolerance:
    type: relative
    value: 0.05
  variance_metric: sum_of_squares
